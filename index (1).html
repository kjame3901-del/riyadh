<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>利雅得探店地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f0; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { background: #1a1a1a; color: #fff; padding: 0 12px; height: 52px; display: flex; align-items: center; gap: 10px; z-index: 1000; flex-shrink: 0; }
  .topbar h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .topbar-sep { width: 1px; height: 20px; background: #333; flex-shrink: 0; }
  .search-box { flex: 1; position: relative; min-width: 0; }
  .search-box input { width: 100%; background: #2a2a2a; border: none; border-radius: 8px; padding: 7px 10px 7px 30px; color: #fff; font-size: 13px; outline: none; }
  .search-box input::placeholder { color: #666; }
  .search-box svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
  .topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn { padding: 6px 12px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: #d4a84b; color: #1a1a1a; }
  .btn-primary:hover { background: #c49a3c; }
  .btn-ghost { background: #2a2a2a; color: #ccc; }
  .btn-ghost:hover { background: #333; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 340px; background: #fff; border-right: 1px solid #e8e4dc; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; z-index: 10; }
  .sidebar-filters { padding: 10px 12px; border-bottom: 1px solid #f0ece4; display: flex; flex-wrap: wrap; gap: 5px; }
  .filter-btn { padding: 4px 10px; border-radius: 20px; border: 1.5px solid #e0dbd0; background: #fff; font-size: 12px; cursor: pointer; transition: all 0.15s; color: #555; }
  .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .filter-btn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  .places-list { flex: 1; overflow-y: auto; }
  .place-item { padding: 12px 16px; border-bottom: 1px solid #f5f2ec; cursor: pointer; transition: background 0.1s; }
  .place-item:hover { background: #faf8f4; }
  .place-item.active { background: #fff8ed; border-left: 3px solid #d4a84b; }
  .place-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .place-cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .place-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .place-rating { font-size: 12px; color: #c49a3c; font-weight: 600; flex-shrink: 0; }
  .place-meta { font-size: 12px; color: #888; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .price-tag { background: #f0ece4; padding: 1px 6px; border-radius: 4px; color: #666; }
  .place-note { font-size: 12px; color: #999; margin-top: 3px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty-state { padding: 40px 20px; text-align: center; color: #aaa; }

  #map { flex: 1; z-index: 1; }

  .detail-panel { position: absolute; right: 12px; bottom: 12px; width: 300px; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); z-index: 500; padding: 18px; display: none; }
  .detail-panel.open { display: block; }
  .detail-close { position: absolute; right: 12px; top: 12px; width: 28px; height: 28px; border-radius: 50%; background: #f5f2ec; border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #666; }
  .detail-cat { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .detail-name { font-size: 18px; font-weight: 700; margin-bottom: 7px; line-height: 1.2; }
  .detail-rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .detail-stars { color: #d4a84b; font-size: 14px; }
  .detail-rating-num { font-size: 13px; font-weight: 600; }
  .detail-info { display: grid; gap: 6px; margin-bottom: 12px; }
  .detail-info-row { display: flex; gap: 8px; font-size: 13px; }
  .detail-info-label { color: #999; width: 44px; flex-shrink: 0; }
  .detail-info-val { color: #1a1a1a; }
  .detail-note-area { background: #faf8f4; border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
  .detail-note-area textarea { width: 100%; background: transparent; border: none; font-size: 13px; color: #555; resize: none; outline: none; font-family: inherit; min-height: 56px; }
  .detail-note-area label { font-size: 11px; color: #bbb; display: block; margin-bottom: 3px; font-weight: 500; }
  .detail-actions { display: flex; gap: 8px; }
  .btn-danger { background: #fff0f0; color: #cc3333; border: none; }
  .btn-danger:hover { background: #ffe0e0; }
  .my-score { display: flex; gap: 3px; align-items: center; margin-bottom: 12px; }
  .my-score label { font-size: 12px; color: #999; margin-right: 4px; }
  .score-star { font-size: 22px; cursor: pointer; color: #ddd; transition: color 0.1s; line-height: 1; }
  .score-star.lit { color: #d4a84b; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2000; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px 32px; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: #999; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 13px; border: 1.5px solid #e8e4dc; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.15s; background: #faf8f4; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #d4a84b; background: #fff; }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .cat-opt { padding: 9px 6px; border: 1.5px solid #e8e4dc; border-radius: 10px; text-align: center; cursor: pointer; font-size: 11px; transition: all 0.15s; background: #faf8f4; }
  .cat-opt.selected { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
  .cat-opt .cat-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; padding: 13px; font-size: 15px; border-radius: 12px; }
  .btn-cancel { background: #f5f2ec; color: #555; border: none; }

  /* Location section */
  .loc-section { border: 1.5px solid #e8e4dc; border-radius: 12px; overflow: hidden; background: #faf8f4; }
  .loc-tabs { display: flex; border-bottom: 1.5px solid #e8e4dc; }
  .loc-tab { flex: 1; padding: 9px 6px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; color: #888; background: #f5f2ec; transition: all 0.15s; border: none; }
  .loc-tab.active { background: #fff; color: #1a1a1a; font-weight: 600; }
  .loc-pane { padding: 12px; display: none; }
  .loc-pane.active { display: block; }
  .loc-row { display: flex; gap: 8px; align-items: center; }
  .loc-row input { flex: 1; padding: 9px 12px; border: 1.5px solid #e8e4dc; border-radius: 8px; font-size: 13px; outline: none; background: #fff; }
  .loc-row input:focus { border-color: #d4a84b; }
  .loc-btn { padding: 9px 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .loc-btn:hover { background: #333; }
  .loc-hint { font-size: 11px; color: #aaa; margin-top: 6px; }
  .loc-success { font-size: 12px; color: #2a9a5a; margin-top: 6px; font-weight: 500; }
  .loc-error { font-size: 12px; color: #cc3333; margin-top: 6px; }
  .search-results { margin-top: 8px; border: 1px solid #e8e4dc; border-radius: 8px; overflow: hidden; max-height: 160px; overflow-y: auto; }
  .search-result-item { padding: 9px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f5f2ec; transition: background 0.1s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: #fff8ed; }
  .search-result-name { font-weight: 500; }
  .search-result-addr { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* Map pick mode */
  body.picking #map { cursor: crosshair !important; }
  .picking-banner { display: none; position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #d4a84b; color: #1a1a1a; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.2); white-space: nowrap; }
  body.picking .picking-banner { display: block; }

  .map-marker { width: 32px; height: 32px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .map-marker span { transform: rotate(45deg); font-size: 14px; }

  .places-list::-webkit-scrollbar { width: 3px; }
  .places-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  .stats-bar { padding: 7px 16px; border-top: 1px solid #f0ece4; font-size: 11px; color: #aaa; background: #faf8f4; flex-shrink: 0; }

  @media (max-width: 600px) {
    .sidebar { width: 100%; height: 38vh; border-right: none; border-top: 1px solid #e8e4dc; order: 2; }
    .main { flex-direction: column-reverse; }
    #map { flex: 1; }
    .detail-panel { width: calc(100% - 24px); bottom: 40vh; right: 12px; }
    .topbar h1 { font-size: 14px; }
    .btn-ghost { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🗺 利雅得探店</h1>
  <div class="topbar-sep"></div>
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="搜索店名..." oninput="filterPlaces()">
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportData()">导出</button>
    <button class="btn btn-ghost btn-sm" onclick="importData()">导入</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 添加</button>
  </div>
</div>

<div class="picking-banner" id="pickingBanner">📍 点击地图选择位置 — 点此取消</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-filters" id="filterBar"></div>
    <div class="places-list" id="placesList"></div>
    <div class="stats-bar" id="statsBar"></div>
  </div>
  <div id="map"></div>
</div>

<!-- Detail panel -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">×</button>
  <div class="detail-cat" id="dCat"></div>
  <div class="detail-name" id="dName"></div>
  <div class="detail-rating-row">
    <div class="detail-stars" id="dStars"></div>
    <div class="detail-rating-num" id="dRating"></div>
  </div>
  <div class="detail-info">
    <div class="detail-info-row"><span class="detail-info-label">价格</span><span class="detail-info-val" id="dPrice"></span></div>
    <div class="detail-info-row"><span class="detail-info-label">风格</span><span class="detail-info-val" id="dStyle"></span></div>
    <div class="detail-info-row"><span class="detail-info-label">地址</span><span class="detail-info-val" id="dAddr"></span></div>
  </div>
  <div class="my-score">
    <label>我的评分</label>
    <span class="score-star" data-v="1" onclick="setMyScore(1)">★</span>
    <span class="score-star" data-v="2" onclick="setMyScore(2)">★</span>
    <span class="score-star" data-v="3" onclick="setMyScore(3)">★</span>
    <span class="score-star" data-v="4" onclick="setMyScore(4)">★</span>
    <span class="score-star" data-v="5" onclick="setMyScore(5)">★</span>
  </div>
  <div class="detail-note-area">
    <label>个人备注</label>
    <textarea id="dNote" placeholder="写下感受、必点菜、停车建议..." onchange="saveNote()"></textarea>
  </div>
  <div class="detail-actions">
    <button class="btn btn-ghost btn-sm" onclick="editPlace()" style="flex:1">编辑</button>
    <button class="btn btn-danger btn-sm" onclick="deletePlace()" style="flex:1">删除</button>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">添加新店铺</h2>
    <input type="hidden" id="editId">

    <div class="form-group">
      <label>分类</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div class="form-group" id="customCatGroup" style="display:none">
      <label>自定义分类名称</label>
      <input type="text" id="customCatName" placeholder="例如：书店、健身房...">
    </div>

    <div class="form-group">
      <label>店名</label>
      <input type="text" id="fName" placeholder="店铺名称">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Google评分 (0-5)</label>
        <input type="number" id="fRating" min="0" max="5" step="0.1" placeholder="4.5">
      </div>
      <div class="form-group">
        <label>价格区间</label>
        <select id="fPrice">
          <option value="">不知道</option>
          <option value="＄">＄ 便宜</option>
          <option value="＄＄">＄＄ 中等</option>
          <option value="＄＄＄">＄＄＄ 偏贵</option>
          <option value="＄＄＄＄">＄＄＄＄ 高档</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>风格 / 特色</label>
      <input type="text" id="fStyle" placeholder="例如：地道沙特菜、网红打卡...">
    </div>
    <div class="form-group">
      <label>地址（可选）</label>
      <input type="text" id="fAddr" placeholder="地址或区域描述">
    </div>

    <!-- Location section with tabs -->
    <div class="form-group">
      <label>地图位置</label>
      <div class="loc-section">
        <div class="loc-tabs">
          <button class="loc-tab active" onclick="switchLocTab('search', this)">🔍 搜索地名</button>
          <button class="loc-tab" onclick="switchLocTab('coords', this)">📐 输入坐标</button>
          <button class="loc-tab" onclick="switchLocTab('gmaps', this)">🔗 粘贴链接</button>
          <button class="loc-tab" onclick="switchLocTab('tap', this)">👆 地图点击</button>
        </div>

        <!-- Search tab -->
        <div class="loc-pane active" id="pane-search">
          <div class="loc-row">
            <input type="text" id="locSearchInput" placeholder="输入店名或地址搜索..." onkeydown="if(event.key==='Enter')searchLocation()">
            <button class="loc-btn" onclick="searchLocation()">搜索</button>
          </div>
          <div class="loc-hint">搜索范围：利雅得周边</div>
          <div id="searchResultsList" class="search-results" style="display:none"></div>
          <div class="loc-success" id="locSearchSuccess" style="display:none"></div>
        </div>

        <!-- Coords tab -->
        <div class="loc-pane" id="pane-coords">
          <div class="loc-row" style="gap:6px">
            <input type="text" id="coordLat" placeholder="纬度 24.688..." style="flex:1">
            <input type="text" id="coordLng" placeholder="经度 46.722..." style="flex:1">
            <button class="loc-btn" onclick="applyCoords()">确认</button>
          </div>
          <div class="loc-hint">从 Google Maps 长按任意位置可复制坐标</div>
          <div class="loc-success" id="locCoordsSuccess" style="display:none"></div>
          <div class="loc-error" id="locCoordsError" style="display:none"></div>
        </div>

        <!-- Google Maps link tab -->
        <div class="loc-pane" id="pane-gmaps">
          <div class="loc-row">
            <input type="text" id="gmapsUrl" placeholder="粘贴 Google Maps 链接...">
            <button class="loc-btn" onclick="parseGmapsUrl()">解析</button>
          </div>
          <div class="loc-hint">在 Google Maps 打开地点 → 点分享 → 复制链接</div>
          <div class="loc-success" id="locGmapsSuccess" style="display:none"></div>
          <div class="loc-error" id="locGmapsError" style="display:none"></div>
        </div>

        <!-- Tap map tab -->
        <div class="loc-pane" id="pane-tap">
          <button class="loc-btn" style="width:100%;padding:11px;background:#1a1a1a" onclick="startPickLocation()">👆 点击后在地图上选择位置</button>
          <div class="loc-success" id="locTapSuccess" style="display:none"></div>
          <div class="loc-hint" style="margin-top:6px">关闭弹窗后点地图任意位置</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>个人备注</label>
      <textarea id="fNote" placeholder="必点菜、停车建议、最佳时段..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="savePlace()">保存</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
const DEFAULT_CATS = [
  { id:'restaurant', name:'餐厅', icon:'🍽', color:'#e8472a' },
  { id:'chocolate',  name:'巧克力', icon:'🍫', color:'#6b3a2a' },
  { id:'hookah',     name:'水烟', icon:'💨', color:'#7b5ea7' },
  { id:'cafe',       name:'咖啡', icon:'☕', color:'#c08040' },
  { id:'dessert',    name:'甜品', icon:'🧁', color:'#e8799a' },
  { id:'other',      name:'其他', icon:'📍', color:'#5a8a5a' },
  { id:'custom',     name:'自定义', icon:'✨', color:'#888' },
];

let categories = JSON.parse(localStorage.getItem('ryd_cats') || 'null') || DEFAULT_CATS;
let places = JSON.parse(localStorage.getItem('ryd_places') || '[]');
let selectedCat = 'all';
let activeId = null;
let pendingLat = null, pendingLng = null;
let isPicking = false;
let markers = {};
let map;
let selectedCatInModal = 'restaurant';

// ── Map ──────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([24.688, 46.722], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);
  map.on('click', function(e) {
    if (!isPicking) return;
    pendingLat = parseFloat(e.latlng.lat.toFixed(6));
    pendingLng = parseFloat(e.latlng.lng.toFixed(6));
    stopPickLocation();
    showLocSuccess('locTapSuccess', `✓ 已选: ${pendingLat}, ${pendingLng}`);
    openAddModal(true);
  });
  document.getElementById('pickingBanner').onclick = () => { stopPickLocation(); openAddModal(true); };
}

function getCat(id) { return categories.find(c => c.id === id) || { icon:'📍', color:'#888', name: id }; }

function createMarkerIcon(cat) {
  const c = getCat(cat);
  return L.divIcon({
    html: `<div class="map-marker" style="background:${c.color}"><span>${c.icon}</span></div>`,
    className:'', iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-34]
  });
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  getFiltered().forEach(p => {
    if (!p.lat || !p.lng) return;
    const m = L.marker([p.lat, p.lng], { icon: createMarkerIcon(p.cat) }).addTo(map);
    m.on('click', () => openDetail(p.id));
    markers[p.id] = m;
  });
}

// ── Filter & list ─────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return places.filter(p => {
    const catOk = selectedCat === 'all' || p.cat === selectedCat;
    const qOk = !q || p.name.toLowerCase().includes(q) || (p.note||'').toLowerCase().includes(q) || (p.style||'').toLowerCase().includes(q);
    return catOk && qOk;
  }).sort((a,b) => (b.rating||0)-(a.rating||0));
}

function setFilter(cat, el) {
  selectedCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList(); renderMarkers();
}

function filterPlaces() { renderList(); renderMarkers(); }

function starsHtml(r) {
  if (!r) return '';
  let s = '';
  for (let i=0; i<Math.floor(r); i++) s+='★';
  if (r%1>=0.5) s+='½';
  return s;
}

function renderList() {
  const list = document.getElementById('placesList');
  const filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div style="font-size:36px">🗺</div><p style="margin-top:10px">暂无店铺<br><small>点右上角＋添加</small></p></div>`;
    document.getElementById('statsBar').textContent = '暂无数据';
    return;
  }
  list.innerHTML = filtered.map(p => {
    const cat = getCat(p.cat);
    const myS = p.myScore ? `<span style="color:#d4a84b;font-size:11px">${'★'.repeat(p.myScore)}</span>` : '';
    return `<div class="place-item${p.id===activeId?' active':''}" onclick="openDetail('${p.id}')">
      <div class="place-item-header">
        <span class="place-cat-dot" style="background:${cat.color}"></span>
        <span class="place-name">${p.name}</span>
        <span class="place-rating">${p.rating?p.rating+' '+starsHtml(p.rating):''}</span>
      </div>
      <div class="place-meta">
        <span>${cat.icon} ${cat.name}</span>
        ${p.price?`<span class="price-tag">${p.price}</span>`:''}
        ${p.style?`<span>${p.style}</span>`:''}
        ${myS}
      </div>
      ${p.note?`<div class="place-note">📝 ${p.note}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('statsBar').textContent = `${filtered.length} / ${places.length} 家店铺`;
}

function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  const counts = {};
  places.forEach(p => counts[p.cat] = (counts[p.cat]||0)+1);
  bar.innerHTML = `<button class="filter-btn${selectedCat==='all'?' active':''}" onclick="setFilter('all',this)">全部 ${places.length}</button>`;
  categories.forEach(c => {
    if (!counts[c.id]) return;
    bar.innerHTML += `<button class="filter-btn${selectedCat===c.id?' active':''}" onclick="setFilter('${c.id}',this)">
      <span class="dot" style="background:${c.color}"></span>${c.icon}${c.name} ${counts[c.id]}
    </button>`;
  });
}

// ── Detail ────────────────────────────────────────────────────
function openDetail(id) {
  activeId = id;
  const p = places.find(x => x.id===id);
  if (!p) return;
  const cat = getCat(p.cat);
  document.getElementById('dCat').textContent = cat.icon+' '+cat.name;
  document.getElementById('dCat').style.color = cat.color;
  document.getElementById('dName').textContent = p.name;
  document.getElementById('dStars').textContent = starsHtml(p.rating);
  document.getElementById('dRating').textContent = p.rating ? `${p.rating} / 5` : '暂无评分';
  document.getElementById('dPrice').textContent = p.price || '未知';
  document.getElementById('dStyle').textContent = p.style || '—';
  document.getElementById('dAddr').textContent = p.address || '—';
  document.getElementById('dNote').value = p.note || '';
  renderMyScore(p.myScore||0);
  document.getElementById('detailPanel').classList.add('open');
  renderList();
  if (p.lat && p.lng) map.panTo([p.lat, p.lng]);
}

function closeDetail() { activeId=null; document.getElementById('detailPanel').classList.remove('open'); renderList(); }

function saveNote() {
  const p = places.find(x=>x.id===activeId);
  if (p) { p.note=document.getElementById('dNote').value; save(); renderList(); }
}

function renderMyScore(score) {
  document.querySelectorAll('.score-star').forEach(s => s.classList.toggle('lit', parseInt(s.dataset.v)<=score));
}

function setMyScore(v) {
  const p = places.find(x=>x.id===activeId);
  if (!p) return;
  p.myScore = p.myScore===v ? 0 : v;
  renderMyScore(p.myScore); save(); renderList();
}

function deletePlace() {
  if (!confirm('确定删除这家店铺？')) return;
  if (markers[activeId]) map.removeLayer(markers[activeId]);
  delete markers[activeId];
  places = places.filter(p=>p.id!==activeId);
  save(); closeDetail(); renderAll();
}

function editPlace() {
  const p = places.find(x=>x.id===activeId);
  if (!p) return;
  openAddModal();
  setTimeout(() => {
    document.getElementById('modalTitle').textContent = '编辑店铺';
    document.getElementById('editId').value = p.id;
    document.getElementById('fName').value = p.name||'';
    document.getElementById('fRating').value = p.rating||'';
    document.getElementById('fPrice').value = p.price||'';
    document.getElementById('fStyle').value = p.style||'';
    document.getElementById('fAddr').value = p.address||'';
    document.getElementById('fNote').value = p.note||'';
    pendingLat = p.lat; pendingLng = p.lng;
    if (p.lat) showLocSuccess('locTapSuccess', `✓ 已有位置: ${p.lat}, ${p.lng}`);
    selectCat(p.cat);
  }, 30);
}

// ── Modal ─────────────────────────────────────────────────────
function openAddModal(keepLocation) {
  if (!keepLocation) { pendingLat=null; pendingLng=null; clearAllLocSuccess(); }
  document.getElementById('modalTitle').textContent = '添加新店铺';
  document.getElementById('editId').value = '';
  ['fName','fRating','fStyle','fAddr','fNote','coordLat','coordLng','gmapsUrl','locSearchInput'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value='';
  });
  document.getElementById('fPrice').value = '';
  document.getElementById('customCatName').value = '';
  document.getElementById('customCatGroup').style.display = 'none';
  document.getElementById('searchResultsList').style.display = 'none';
  renderCatGrid();
  selectCat('restaurant');
  switchLocTab('search', document.querySelector('.loc-tab'));
  document.getElementById('modalOverlay').classList.add('open');
}

function renderCatGrid() {
  document.getElementById('catGrid').innerHTML = categories.map(c =>
    `<div class="cat-opt${c.id===selectedCatInModal?' selected':''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>${c.name}
    </div>`).join('');
}

function selectCat(id) {
  selectedCatInModal = id;
  document.querySelectorAll('.cat-opt').forEach((el,i) => el.classList.toggle('selected', categories[i].id===id));
  document.getElementById('customCatGroup').style.display = id==='custom' ? 'block' : 'none';
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('modalOverlay')) closeModal(); }

function savePlace() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('请填写店名'); return; }
  let catId = selectedCatInModal;
  if (catId==='custom') {
    const cn = document.getElementById('customCatName').value.trim();
    if (!cn) { alert('请输入自定义分类名称'); return; }
    const ex = categories.find(c=>c.name===cn);
    if (ex) { catId=ex.id; }
    else {
      const nc = { id:'cat_'+Date.now(), name:cn, icon:'📌', color:'#'+Math.floor(Math.random()*0xaaaaaa+0x444444).toString(16) };
      categories.push(nc); localStorage.setItem('ryd_cats', JSON.stringify(categories)); catId=nc.id;
    }
  }
  const editId = document.getElementById('editId').value;
  const data = {
    id: editId||'p_'+Date.now(), name, cat:catId,
    rating: parseFloat(document.getElementById('fRating').value)||null,
    price: document.getElementById('fPrice').value,
    style: document.getElementById('fStyle').value.trim(),
    address: document.getElementById('fAddr').value.trim(),
    note: document.getElementById('fNote').value.trim(),
    lat: pendingLat ? parseFloat(pendingLat) : null,
    lng: pendingLng ? parseFloat(pendingLng) : null,
    myScore: 0,
    createdAt: editId ? (places.find(p=>p.id===editId)||{}).createdAt : new Date().toISOString()
  };
  if (editId) {
    const idx = places.findIndex(p=>p.id===editId);
    if (idx>-1) { data.myScore=places[idx].myScore||0; places[idx]=data; }
  } else { places.push(data); }
  save(); closeModal(); renderAll();
  if (data.lat && data.lng) openDetail(data.id);
}

// ── Location tabs ─────────────────────────────────────────────
function switchLocTab(name, el) {
  document.querySelectorAll('.loc-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.loc-pane').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll('.loc-tab')[0].classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}

function showLocSuccess(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent=msg; el.style.display='block'; }
}
function hideEl(id) { const el=document.getElementById(id); if(el) el.style.display='none'; }
function clearAllLocSuccess() {
  ['locSearchSuccess','locCoordsSuccess','locCoordsError','locGmapsSuccess','locGmapsError','locTapSuccess'].forEach(hideEl);
}

// Search by name (Nominatim)
async function searchLocation() {
  const q = document.getElementById('locSearchInput').value.trim();
  if (!q) return;
  const res = document.getElementById('searchResultsList');
  res.style.display='block'; res.innerHTML='<div style="padding:10px 12px;color:#aaa;font-size:13px">搜索中...</div>';
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' Riyadh Saudi Arabia')}&format=json&limit=6&accept-language=zh`;
    const data = await fetch(url, {headers:{'Accept-Language':'zh'}}).then(r=>r.json());
    if (!data.length) { res.innerHTML='<div style="padding:10px 12px;color:#aaa;font-size:13px">未找到结果，试试英文或更精确的名称</div>'; return; }
    res.innerHTML = data.map(d => `
      <div class="search-result-item" onclick="selectSearchResult(${d.lat},${d.lon},'${d.display_name.replace(/'/g,'')}')">
        <div class="search-result-name">${d.name||d.display_name.split(',')[0]}</div>
        <div class="search-result-addr">${d.display_name.split(',').slice(1,3).join(',')}</div>
      </div>`).join('');
  } catch { res.innerHTML='<div style="padding:10px 12px;color:#cc3333;font-size:13px">搜索失败，请检查网络</div>'; }
}

function selectSearchResult(lat, lng, name) {
  pendingLat=parseFloat(parseFloat(lat).toFixed(6));
  pendingLng=parseFloat(parseFloat(lng).toFixed(6));
  document.getElementById('searchResultsList').style.display='none';
  showLocSuccess('locSearchSuccess', `✓ 已选: ${name.substring(0,30)}`);
  map.setView([pendingLat, pendingLng], 16);
}

// Input coordinates
function applyCoords() {
  hideEl('locCoordsError'); hideEl('locCoordsSuccess');
  let lat = parseFloat(document.getElementById('coordLat').value.trim());
  let lng = parseFloat(document.getElementById('coordLng').value.trim());
  // Handle "lat, lng" pasted into first field
  const combined = document.getElementById('coordLat').value.trim();
  if (combined.includes(',')) {
    const parts = combined.split(',').map(s=>s.trim());
    lat=parseFloat(parts[0]); lng=parseFloat(parts[1]);
  }
  if (isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180) {
    showLocSuccess('locCoordsError', '坐标格式错误，请输入如：24.688, 46.722'); return;
  }
  pendingLat=parseFloat(lat.toFixed(6)); pendingLng=parseFloat(lng.toFixed(6));
  showLocSuccess('locCoordsSuccess', `✓ 已确认坐标: ${pendingLat}, ${pendingLng}`);
  map.setView([pendingLat, pendingLng], 16);
}

// Parse Google Maps URL
function parseGmapsUrl() {
  hideEl('locGmapsError'); hideEl('locGmapsSuccess');
  const url = document.getElementById('gmapsUrl').value.trim();
  let lat=null, lng=null;
  // Try @lat,lng pattern
  let m = url.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
  if (m) { lat=parseFloat(m[1]); lng=parseFloat(m[2]); }
  // Try ?q=lat,lng
  if (!lat) { m=url.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);} }
  // Try !3d lat !4d lng
  if (!lat) { m=url.match(/!3d(-?\d+\.?\d*).*!4d(-?\d+\.?\d*)/); if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);} }
  // Try ll=lat,lng
  if (!lat) { m=url.match(/ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m){lat=parseFloat(m[1]);lng=parseFloat(m[2]);} }

  if (!lat || !lng) { showLocSuccess('locGmapsError', '无法解析链接，请确认是 Google Maps 分享链接'); return; }
  pendingLat=parseFloat(lat.toFixed(6)); pendingLng=parseFloat(lng.toFixed(6));
  showLocSuccess('locGmapsSuccess', `✓ 已解析坐标: ${pendingLat}, ${pendingLng}`);
  map.setView([pendingLat, pendingLng], 16);
}

// Tap map
function startPickLocation() {
  closeModal();
  document.body.classList.add('picking');
  isPicking=true;
}
function stopPickLocation() {
  document.body.classList.remove('picking');
  isPicking=false;
}

// ── Persist ───────────────────────────────────────────────────
function save() { localStorage.setItem('ryd_places', JSON.stringify(places)); }
function renderAll() { renderFilterBar(); renderList(); renderMarkers(); }

function exportData() {
  const blob = new Blob([JSON.stringify({places,categories,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`利雅得探店_${new Date().toLocaleDateString('zh')}.json`; a.click();
}
function importData() { document.getElementById('importFile').click(); }
function handleImport(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(data.places && confirm(`导入 ${data.places.length} 家店铺？（合并到现有）`)){
        const ids=new Set(places.map(p=>p.id));
        data.places.forEach(p=>{if(!ids.has(p.id))places.push(p);});
        if(data.categories){const cids=new Set(categories.map(c=>c.id));data.categories.forEach(c=>{if(!cids.has(c.id))categories.push(c);});localStorage.setItem('ryd_cats',JSON.stringify(categories));}
        save(); renderAll(); alert('导入成功！');
      }
    } catch { alert('文件格式错误'); }
  };
  reader.readAsText(file); e.target.value='';
}
